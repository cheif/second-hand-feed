<html>
    <head>
        <link rel="stylesheet" href="https://unpkg.com/missing.css@1.1.3">
        <link href="atom.xml" type="application/atom+xml" rel="alternate" title="Atom Feed" />
        <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js" integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz" crossorigin="anonymous"></script>
    </head>
    <body>
        <header class="navbar">
            <h1>Second hand - feed generator</h1>
        </header>
        <main>
            <table>
                <caption>Queries</caption>
                <thead>
                    <th scope="col">Provider</th>
                    <th scope="col">Query</th>
                    <th scope="col">Remove</th>
                </thead>
                <tbody>
                    {{range . }}
                    <tr>
                        <th scope="row">{{.Provider}}</th>
                        <td><a href="{{.Query}}">{{.Query}}</a></td>
                        <td>
                            <button hx-delete="/queries/{{.Id}}" hx-target="body">Remove</button>
                        </td>
                    </tr>
                    {{end}}
                </tbody>
            </table>
            <form hx-post="/queries/add" hx-target="body">
                <label for=search>Add</label>
                <input id=search type=search name=query placeholder="Search" />
                <strong>
                    <button type=submit>Add query</button>
                </strong>
            </form>
        </main>
    </body>
</html>
